<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        color-scheme: light;
        --page: #f3f3f3;
        --panel: #ffffff;
        --surface: #ffffff;
        --soft: #f4f4f4;
        --soft-2: #f9f9f9;
        --text: #101010;
        --muted: #666666;
        --label: #555555;
        --quiet: #969696;
        --border: #dddddd;
        --border-strong: rgba(0, 0, 0, 0.15);
        --action: #0d0d0d;
        --action-text: #ffffff;
        --green: #00c961;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.055), 0 0 0.5px rgba(0, 0, 0, 0.28);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --page: #0b0b0b;
        --panel: #050505;
        --surface: #202020;
        --soft: #252525;
        --soft-2: #1b1b1b;
        --text: #ffffff;
        --muted: #a7a7a7;
        --label: #d6d6d6;
        --quiet: #8b8b8b;
        --border: #464646;
        --border-strong: rgba(255, 255, 255, 0.42);
        --action: #f5f5f5;
        --action-text: #111111;
        --shadow: 0 4px 14px rgba(0, 0, 0, 0.34), 0 0 0.5px rgba(255, 255, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 380px;
        min-height: 292px;
        margin: 0;
        overflow: hidden;
        color: var(--text);
        background: var(--page);
        font: 12px/1.2 "PingFang SC", "Microsoft YaHei", Inter, system-ui, sans-serif;
      }

      button,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--green);
        outline-offset: 2px;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 15px;
        border-radius: 30px;
        background: var(--panel);
      }

      .topbar {
        height: 27px;
        display: flex;
        align-items: center;
      }

      .top-chip {
        min-height: 27px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 15px;
        border-radius: 24px;
        color: var(--text);
        background: var(--soft);
        font-size: 12px;
        font-weight: 800;
        line-height: 13px;
      }

      .mode-dot {
        width: 7px;
        height: 7px;
        flex: 0 0 7px;
        border-radius: 50%;
        background: var(--green);
      }

      .content-stack {
        width: 350px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .file-card {
        position: relative;
        min-height: 147px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 15px;
        padding: 30px;
        border-radius: 24px;
        color: var(--text);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .file-row {
        display: flex;
        align-items: center;
        gap: 35px;
      }

      .file-ring {
        width: 71px;
        height: 71px;
        flex: 0 0 71px;
        display: grid;
        place-items: center;
        padding: 0;
        border: 10px solid var(--soft);
        border-radius: 50%;
        color: var(--text);
        background: var(--surface);
      }

      .has-file .file-ring {
        border-color: var(--green);
      }

      .file-ring svg {
        display: block;
        width: 26px;
        height: 26px;
        overflow: visible;
        transform: translateX(1px);
      }

      .file-copy {
        min-width: 0;
        display: grid;
        gap: 19px;
        cursor: pointer;
      }

      .file-title {
        min-width: 0;
        overflow: hidden;
        color: var(--text);
        font-size: 23px;
        font-weight: 900;
        line-height: 24px;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .file-name {
        overflow: hidden;
        max-width: 190px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        line-height: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .settings-toggle {
        position: absolute;
        left: 50%;
        bottom: 9px;
        width: 46px;
        height: 18px;
        padding: 0;
        border-radius: 999px;
        background: transparent;
        transform: translateX(-50%);
      }

      .settings-toggle::before {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 7px;
        height: 4px;
        border-radius: 999px;
        background: var(--quiet);
      }

      .settings-panel {
        display: none;
        gap: 15px;
        padding-bottom: 15px;
      }

      .settings-open .settings-panel {
        display: grid;
      }

      .field {
        display: grid;
        gap: 15px;
      }

      label {
        color: var(--label);
        font-size: 15px;
        font-weight: 500;
        line-height: 16px;
      }

      .native-select {
        display: none;
      }

      .select-wrap {
        position: relative;
      }

      .select-trigger {
        width: 100%;
        min-height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 12px 15px;
        border: 1px solid var(--border);
        border-radius: 30px;
        color: var(--text);
        background: var(--surface);
        font-size: 15px;
        font-weight: 500;
        line-height: 14px;
        text-align: left;
      }

      .select-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chevron {
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
      }

      .select-menu {
        position: absolute;
        z-index: 30;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 15px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .select-wrap.open .select-menu {
        display: grid;
      }

      .select-option {
        min-height: 28px;
        padding: 6px 9px;
        border-radius: 10px;
        color: var(--text);
        background: transparent;
        text-align: left;
        font-size: 12px;
      }

      .select-option:hover,
      .select-option.active {
        background: var(--soft);
      }

      .manual-toggle {
        justify-self: start;
        padding: 0;
        color: var(--muted);
        background: transparent;
        font-size: 11px;
      }

      .manual {
        display: none;
        gap: 8px;
      }

      .manual.open {
        display: grid;
      }

      textarea {
        width: 100%;
        min-height: 84px;
        resize: vertical;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 14px;
        color: var(--text);
        background: var(--surface);
        font: 11px/1.4 ui-monospace, Consolas, monospace;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .actions button {
        height: 56px;
        border-radius: 30px;
        font-size: 18px;
        font-weight: 500;
        line-height: 20px;
      }

      #cancel {
        border: 1px solid var(--border-strong);
        color: var(--text);
        background-color: var(--surface);
      }

      #import {
        color: var(--action-text);
        background-color: var(--action);
      }

      :root[data-theme="dark"] #cancel {
        color: #ffffff;
        background-color: #050505;
      }

      :root[data-theme="dark"] #import {
        color: #111111;
        background-color: #f5f5f5;
      }

      .has-file .actions {
        grid-template-columns: 56px 1fr;
      }

      .has-file #cancel {
        padding: 0;
        border-radius: 50%;
        font-size: 0;
      }

      .has-file #cancel::before {
        content: "‹";
        font-size: 32px;
        line-height: 1;
      }

      .hint {
        display: none;
      }

      html {
        background: transparent;
        border-radius: 40px;
        overflow: hidden;
      }

      body {
        width: 260px;
        min-height: 0;
        border-radius: 40px;
        overflow: hidden;
        background: transparent;
        font-family: "PingFang SC", "PingFang TC", "PingFang HK", sans-serif;
      }

      .shell {
        width: 260px;
        min-height: 0;
        gap: 10px;
        padding: 10px;
        border-radius: 40px;
        overflow: hidden;
      }

      .topbar {
        height: 20px;
      }

      .top-chip {
        min-height: 20px;
        gap: 5px;
        padding: 5px 9px;
        border-radius: 18px;
        font-size: 11px;
        line-height: 11px;
      }

      .mode-dot {
        width: 6px;
        height: 6px;
        flex-basis: 6px;
      }

      .content-stack {
        width: 240px;
        gap: 10px;
      }

      .file-card {
        min-height: 98px;
        gap: 10px;
        padding: 20px;
        border-radius: 20px;
      }

      .file-row {
        gap: 22px;
      }

      .file-ring {
        width: 48px;
        height: 48px;
        flex-basis: 48px;
        border-width: 7px;
      }

      .file-ring svg {
        width: 18px;
        height: 18px;
      }

      .file-copy {
        gap: 11px;
      }

      .file-title {
        font-size: 17px;
        line-height: 18px;
      }

      .file-name {
        max-width: 132px;
        font-size: 8px;
        line-height: 10px;
      }

      .settings-toggle {
        bottom: 4px;
        width: 34px;
        height: 16px;
      }

      .settings-toggle::before {
        left: 7px;
        right: 7px;
        top: 7px;
        height: 3px;
      }

      .settings-panel {
        gap: 10px;
        padding-bottom: 12px;
      }

      .field {
        gap: 8px;
      }

      label {
        font-size: 12px;
        line-height: 13px;
      }

      .native-select {
        width: 100%;
        min-height: 29px;
        appearance: none;
        -webkit-appearance: none;
        display: block;
        padding: 0 30px 0 12px;
        border: 1px solid var(--border);
        border-radius: 18px;
        color: var(--text);
        background-color: var(--surface);
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%23101010' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-position: right 11px center;
        background-repeat: no-repeat;
        background-size: 12px 12px;
        font-size: 12px;
        line-height: 13px;
      }

      :root[data-theme="dark"] .native-select {
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%23ffffff' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      }

      .select-trigger,
      .select-menu {
        display: none !important;
      }

      .manual-toggle {
        font-size: 9px;
      }

      textarea {
        min-height: 70px;
        padding: 8px;
        border-radius: 12px;
        font-size: 10px;
      }

      .actions {
        gap: 10px;
      }

      .actions button {
        height: 38px;
        border-radius: 22px;
        font-size: 15px;
        line-height: 16px;
      }

      .has-file .actions {
        grid-template-columns: 38px 1fr;
      }

      .has-file #cancel::before {
        font-size: 24px;
      }

      .native-select {
        display: none;
      }

      .select-trigger {
        min-height: 29px;
        display: flex !important;
        padding: 0 12px;
        border-radius: 18px;
        font-size: 12px;
        line-height: 13px;
      }

      .select-menu {
        top: calc(100% + 6px);
        display: none !important;
        padding: 6px;
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .select-wrap.open .select-menu {
        display: grid !important;
      }

      .select-option {
        min-height: 26px;
        padding: 6px 9px;
        border-radius: 10px;
        font-size: 12px;
      }

      .select-option:hover,
      .select-option.active {
        background: var(--soft);
      }

      .has-file .actions {
        grid-template-columns: 1fr 1fr;
      }

      .has-file #cancel {
        padding: 0 10px;
        border-radius: 22px;
        font-size: 15px;
      }

      .has-file #cancel::before {
        content: none;
      }

      .import-confirm .actions {
        grid-template-columns: 38px 1fr;
      }

      .import-confirm #cancel {
        order: 1;
        padding: 0;
        border-radius: 50%;
        font-size: 0;
      }

      .import-confirm #cancel::before {
        content: "‹";
        font-size: 24px;
        line-height: 1;
      }

      .import-confirm #import {
        order: 2;
      }

      @property --ring-fill {
        syntax: "<percentage>";
        inherits: false;
        initial-value: 0%;
      }

      :root {
        --motion-ease: cubic-bezier(0.22, 0.9, 0.25, 1);
        --motion-snap: cubic-bezier(0.2, 1.35, 0.35, 1);
        --theme-wipe-color: #050505;
      }

      body,
      .shell,
      .file-card,
      .top-chip,
      #cancel,
      #import,
      .select-trigger,
      .select-option,
      .settings-toggle::before,
      .manual-toggle {
        transition:
          background-color 220ms var(--motion-ease),
          border-color 220ms var(--motion-ease),
          color 180ms var(--motion-ease),
          box-shadow 220ms var(--motion-ease),
          opacity 180ms var(--motion-ease),
          transform 180ms var(--motion-ease);
      }

      body::before {
        content: "";
        position: fixed;
        inset: -36px;
        z-index: 999;
        pointer-events: none;
        background: linear-gradient(110deg, transparent 0%, var(--theme-wipe-color) 38%, var(--theme-wipe-color) 62%, transparent 100%);
        opacity: 0;
        transform: translateX(-120%) skewX(-10deg);
      }

      :root.theme-wipe body::before {
        animation: theme-wipe 460ms var(--motion-ease) both;
      }

      button:not(:disabled):active {
        transform: scale(0.98);
      }

      .actions {
        transition: grid-template-columns 230ms var(--motion-ease), gap 180ms var(--motion-ease);
      }

      .actions button {
        transition:
          width 230ms var(--motion-ease),
          background-color 180ms var(--motion-ease),
          border-color 180ms var(--motion-ease),
          color 180ms var(--motion-ease),
          opacity 160ms var(--motion-ease),
          transform 160ms var(--motion-ease);
      }

      .file-ring {
        position: relative;
        isolation: isolate;
        --ring-width: 7px;
      }

      .file-ring::before,
      .file-ring::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
      }

      .file-ring::before {
        z-index: 0;
        background: conic-gradient(from -90deg, var(--green) var(--ring-fill), var(--soft) 0);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - var(--ring-width)), #000 calc(100% - var(--ring-width)));
        mask: radial-gradient(farthest-side, transparent calc(100% - var(--ring-width)), #000 calc(100% - var(--ring-width)));
      }

      .file-ring svg {
        position: relative;
        z-index: 1;
        --icon-offset-x: 1px;
        transform: translateX(var(--icon-offset-x));
      }

      .file-ring .ring-progress {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        opacity: 0;
        transform: rotate(-90deg);
      }

      .ring-progress-track,
      .ring-progress-fill {
        fill: none;
        stroke-width: 7;
      }

      .ring-progress-track {
        stroke: var(--soft);
      }

      .ring-progress-fill {
        stroke: var(--green);
        stroke-linecap: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
      }

      .shell.is-generating .file-ring {
        border-color: transparent !important;
      }

      .shell.is-generating .file-ring::before {
        opacity: 0;
        animation: none;
      }

      .shell.is-generating .file-ring::after {
        opacity: 0;
        animation: none;
      }

      .shell.is-generating .file-ring .ring-progress {
        opacity: 1;
        animation: none;
      }

      .shell.is-generating .file-ring .ring-progress-fill {
        animation: ring-stroke-fill 950ms cubic-bezier(0.2, 0.85, 0.2, 1) forwards;
      }

      .shell.is-generating .file-ring svg {
        animation: icon-focus 900ms ease-in-out infinite alternate;
      }

      .shell.motion-success .file-ring {
        animation: ring-pop 560ms var(--motion-snap);
      }

      .shell.motion-success .file-ring::after {
        border: 2px solid var(--green);
        animation: ring-wave 620ms ease-out forwards;
      }

      .shell.motion-error .file-ring {
        animation: micro-shake 260ms ease-in-out;
      }

      .settings-open .settings-panel,
      .manual.open {
        animation: drawer-in 220ms var(--motion-ease) both;
      }

      .select-wrap.open .select-menu {
        animation: menu-in 140ms var(--motion-ease) both;
      }

      @keyframes ring-fill {
        from {
          --ring-fill: 0%;
        }
        to {
          --ring-fill: 100%;
        }
      }

      @keyframes ring-stroke-fill {
        from {
          stroke-dashoffset: 100;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes ring-hold {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.025);
        }
      }

      @keyframes ring-cap {
        from {
          transform: rotate(0deg) translateY(calc(-24px + var(--ring-width) / 2));
        }
        to {
          transform: rotate(360deg) translateY(calc(-24px + var(--ring-width) / 2));
        }
      }

      @keyframes ring-cap-hold {
        from {
          transform: rotate(360deg) translateY(calc(-24px + var(--ring-width) / 2)) scale(1);
        }
        to {
          transform: rotate(360deg) translateY(calc(-24px + var(--ring-width) / 2)) scale(1.12);
        }
      }

      @keyframes ring-pop {
        0% {
          transform: scale(1);
        }
        58% {
          transform: scale(1.09);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes ring-wave {
        0% {
          inset: -2px;
          opacity: 0.52;
          transform: scale(0.98);
        }
        100% {
          inset: -9px;
          opacity: 0;
          transform: scale(1.08);
        }
      }

      @keyframes icon-focus {
        from {
          transform: translateX(var(--icon-offset-x)) scale(1);
        }
        to {
          transform: translateX(var(--icon-offset-x)) scale(1.08);
        }
      }

      @keyframes micro-shake {
        0%,
        100% {
          transform: translateX(0);
        }
        30% {
          transform: translateX(-3px);
        }
        65% {
          transform: translateX(3px);
        }
      }

      @keyframes drawer-in {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes menu-in {
        from {
          opacity: 0;
          transform: translateY(4px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes theme-wipe {
        0% {
          opacity: 0;
          transform: translateX(-120%) skewX(-10deg);
        }
        22% {
          opacity: 0.95;
        }
        100% {
          opacity: 0;
          transform: translateX(120%) skewX(-10deg);
        }
      }

      :root {
        --motion-ease: cubic-bezier(0.2, 0.85, 0.18, 1);
        --motion-morph: cubic-bezier(0.18, 0.92, 0.18, 1);
        --motion-snap: cubic-bezier(0.18, 1.45, 0.32, 1);
      }

      html,
      body,
      .shell {
        border-radius: 0 !important;
      }

      body::before,
      :root.theme-wipe body::before {
        display: none !important;
        animation: none !important;
      }

      body,
      .shell,
      .file-card,
      .top-chip,
      #cancel,
      #import,
      .select-trigger,
      .select-option,
      .settings-toggle,
      .settings-toggle::before,
      .manual-toggle {
        transition:
          background-color 520ms var(--motion-ease),
          border-color 520ms var(--motion-ease),
          color 420ms var(--motion-ease),
          box-shadow 520ms var(--motion-ease),
          opacity 360ms var(--motion-ease),
          transform 360ms var(--motion-ease);
      }

      .file-card {
        cursor: pointer;
      }

      .file-card:hover {
        animation: pulse-glow 1600ms ease-in-out infinite;
        box-shadow: 0 8px 24px rgba(0, 201, 97, 0.14), var(--shadow);
      }

      .file-card:hover .file-ring {
        box-shadow: 0 0 0 6px rgba(0, 201, 97, 0.08), 0 0 24px rgba(0, 201, 97, 0.22);
        transform: scale(1.025);
      }

      .file-card:has(.settings-toggle:hover) {
        animation: none;
        box-shadow: var(--shadow);
      }

      .file-card:has(.settings-toggle:hover) .file-ring {
        box-shadow: none;
        transform: none;
      }

      .top-chip:not(:disabled):hover,
      #cancel:not(:disabled):hover,
      #import:not(:disabled):hover,
      .select-trigger:not(:disabled):hover,
      .manual-toggle:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      }

      #import:not(:disabled):hover {
        filter: brightness(1.08);
      }

      .select-trigger:not(:disabled):hover,
      #cancel:not(:disabled):hover {
        border-color: rgba(0, 201, 97, 0.34);
      }

      .settings-toggle {
        top: 70px !important;
        right: 0 !important;
        bottom: auto !important;
        left: 0 !important;
        z-index: 4;

    <script>

      const fileTitle = document.getElementById("file-title");

      const manual = document.getElementById("manual");
      const language = document.getElementById("language");
      const mode = document.getElementById("mode");
      const dropZone = document.getElementById("drop-zone");
      const settingsPanel = document.getElementById("settings-panel");
      const settingsToggle = document.getElementById("settings-toggle");
      const importButton = document.getElementById("import");
      const cancelButton = document.getElementById("cancel");
      const clearFileButton = document.getElementById("clear-file");
      const actions = document.querySelector(".actions");
      const themeToggle = document.getElementById("theme-toggle");
      const topThemeToggle = document.getElementById("top-theme-toggle");
      let hasFile = false;
      let importConfirm = false;
      let themeTouched = false;
      let themeCrossfadeTimer = null;
      let ringMotionTimer = null;
      let ringProgressFrame = null;
      let actionMorphTimer = null;
      let generateMotionStartedAt = 0;
      const ACTION_MORPH_MS = 560;
      const MIN_GENERATE_MOTION_MS = 650;
      const RING_HOLD_TARGET = 78;
      const RING_HOLD_MS = 1600;
      const RING_COMPLETE_MS = 280;

      parent.postMessage({ pluginMessage: { type: "ui-ready" } }, "*");

      function resizePanel(height) {
        parent.postMessage({ pluginMessage: { type: "resize-ui", height } }, "*");
      }

      function setTheme(theme, persist) {
        const next = theme === "dark" ? "dark" : "light";
        if (persist) playThemeCrossfade();
        document.documentElement.dataset.theme = next;
        if (persist) {
          themeTouched = true;
          parent.postMessage({ pluginMessage: { type: "set-theme", theme: next } }, "*");
        }
      }

      function playThemeCrossfade() {
        const root = document.documentElement;
        root.classList.remove("theme-crossfade");
        void root.offsetWidth;
        root.classList.add("theme-crossfade");
        clearTimeout(themeCrossfadeTimer);
        themeCrossfadeTimer = setTimeout(() => root.classList.remove("theme-crossfade"), 720);
      }

      function toggleTheme() {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        setTheme(next, true);
      }

      themeToggle.onclick = (event) => {
        event.stopPropagation();
        toggleTheme();
      };

      topThemeToggle.onclick = (event) => {
        event.stopPropagation();
        toggleTheme();
      };

      window.onmessage = (event) => {
        const message = event.data && event.data.pluginMessage;
        if (message && message.type === "preferences" && !themeTouched) setTheme(message.theme);
        if (message && message.type === "import-complete") finishGenerateMotion(true);
        if (message && message.type === "import-error") finishGenerateMotion(false);
      };

      dropZone.onclick = (event) => {
        if (event.target.closest("#file, #settings-toggle, #theme-toggle, #top-theme-toggle, .settings-panel, .select-menu, .select-trigger, #toggle-manual, textarea")) return;
        toggleTheme();
      };

      fileCopy.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggleTheme();
        }
      };

      fileInput.onchange = () => {
        const file = fileInput.files && fileInput.files[0];
        if (file) loadFile(file);
      };

      fileInput.onclick = (event) => {
        event.stopPropagation();
      };

      dropZone.ondragover = (event) => {
        event.preventDefault();
      };

      dropZone.ondrop = (event) => {
        event.preventDefault();
        const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
        if (file) loadFile(file);
      };

      settingsToggle.onclick = (event) => {
        event.stopPropagation();
        const open = shell.classList.toggle("settings-open");
        settingsPanel.inert = !open;
        settingsToggle.setAttribute("aria-expanded", String(open));
        resizePanel(open ? 342 : 188);
      };

      document.getElementById("toggle-manual").onclick = (event) => {
        event.stopPropagation();
        manual.classList.toggle("open");
        resizePanel(manual.classList.contains("open") ? 440 : 360);
      };

      importButton.onclick = () => {
        if (!textarea.value.trim()) {
          fileInput.click();
          return;
        }
        if (!importConfirm) {
          setImportConfirm(true);
          return;
        }
        startGenerateMotion();
        parent.postMessage({ pluginMessage: { type: "import", json: textarea.value, language: language.value, mode: mode.value } }, "*");
      };

      cancelButton.onclick = () => {
        if (importConfirm) {
          setImportConfirm(false);
          return;
        }
        fileInput.click();
      };

      clearFileButton.onclick = () => {
        if (!hasFile) return;
        clearFile();
      };

      document.addEventListener("click", (event) => {
        for (const wrap of document.querySelectorAll(".select-wrap.open")) {
          if (!wrap.contains(event.target)) closeSelect(wrap);
        }
      });

      for (const wrap of document.querySelectorAll(".select-wrap")) {
        const select = wrap.querySelector("select");
        const trigger = wrap.querySelector(".select-trigger");
        const label = wrap.querySelector(".select-label");
        const options = Array.from(wrap.querySelectorAll(".select-option"));
        trigger.onclick = (event) => {
          event.stopPropagation();
          const isOpen = wrap.classList.contains("open");
          for (const other of document.querySelectorAll(".select-wrap.open")) closeSelect(other);
          if (!isOpen) {
            wrap.classList.add("open");
            trigger.setAttribute("aria-expanded", "true");
          }
        };
        for (const option of options) {
          option.onclick = (event) => {
            event.stopPropagation();
            select.value = option.dataset.value || "";
            label.textContent = option.textContent || "";
            for (const item of options) item.classList.toggle("active", item === option);
            closeSelect(wrap);
          };
        }
      }

      function closeSelect(wrap) {
        wrap.classList.remove("open");
        const trigger = wrap.querySelector(".select-trigger");
        if (trigger) trigger.setAttribute("aria-expanded", "false");
      }

      function loadFile(file) {
        readFileAsText(file, (content) => {
          textarea.value = content;
          fileName.textContent = file.name;
          fileTitle.textContent = "已选择采集文件";
          hasFile = true;
        shell.classList.add("has-file");
        clearFileButton.disabled = false;
        setImportConfirm(false);
          resizePanel(shell.classList.contains("settings-open") ? 342 : 188);
        });
      }

      function setImportConfirm(enabled) {
        playActionMorph(() => {
          importConfirm = Boolean(enabled);
          shell.classList.toggle("import-confirm", importConfirm);
          importButton.textContent = importConfirm ? "确认生成" : "生成";
        });
      }

      function playActionMorph(applyState) {
        if (!actions) {
          if (applyState) applyState();
          return;
        }
        clearTimeout(actionMorphTimer);
        actions.classList.add("morphing");
        void actions.offsetWidth;
        if (applyState) applyState();
        actionMorphTimer = setTimeout(() => {
          actions.classList.remove("morphing");
        }, ACTION_MORPH_MS);
      }

      function startGenerateMotion() {
        generateMotionStartedAt = performance.now();
        shell.classList.add("is-generating");
        startRingProgress(shell);
        importButton.disabled = true;
        cancelButton.disabled = true;
      }

      async function finishGenerateMotion(succeeded) {
        const elapsed = performance.now() - generateMotionStartedAt;
        if (elapsed < MIN_GENERATE_MOTION_MS) await delay(MIN_GENERATE_MOTION_MS - elapsed);
        await finishRingProgress(shell, succeeded);
        shell.classList.remove("is-generating");
        importButton.disabled = false;
        cancelButton.disabled = false;
        playRingFeedback(succeeded ? "motion-success" : "motion-error");
      }

      function ringFill(root) {
        return root ? root.querySelector(".ring-progress-fill") : null;
      }

      function setRingProgress(root, value, options = {}) {
        const fill = ringFill(root);
        if (!fill) return;
        const progress = Math.max(0, Math.min(100, value));
        if (options.reset) {
          fill.style.transition = "none";
          fill.style.strokeDashoffset = "100";
          void fill.getBoundingClientRect();
          fill.style.transition = "";
        }
        fill.style.strokeDashoffset = String(100 - progress);
      }

      function startRingProgress(root) {
        cancelAnimationFrame(ringProgressFrame);
        const startedAt = performance.now();
        setRingProgress(root, 0, { reset: true });

        const tick = (now) => {
          if (!root || !root.classList.contains("is-generating")) return;
          const ratio = Math.min(1, (now - startedAt) / RING_HOLD_MS);
          const eased = 0.34 * ratio + 0.66 * ratio * ratio;
          const progress = Math.min(RING_HOLD_TARGET, eased * RING_HOLD_TARGET);
          setRingProgress(root, progress);
          ringProgressFrame = requestAnimationFrame(tick);
        };

        ringProgressFrame = requestAnimationFrame(tick);
      }

      function finishRingProgress(root, succeeded) {
        cancelAnimationFrame(ringProgressFrame);
        const fill = ringFill(root);
        if (!fill) return Promise.resolve();

        if (!succeeded) {
          setRingProgress(root, 0);
          return Promise.resolve();
        }

        const startOffset = Number.parseFloat(fill.style.strokeDashoffset || "100");
        const startProgress = Math.max(0, Math.min(100, 100 - startOffset));
        const startedAt = performance.now();

        return new Promise((resolve) => {
          const tick = (now) => {
            const ratio = Math.min(1, (now - startedAt) / RING_COMPLETE_MS);
            const eased = 1 - Math.pow(1 - ratio, 3);
            setRingProgress(root, startProgress + (100 - startProgress) * eased);
            if (ratio < 1) {
              ringProgressFrame = requestAnimationFrame(tick);
            } else {
              setRingProgress(root, 100);
              resolve();
            }
          };
          ringProgressFrame = requestAnimationFrame(tick);
        });
      }

      function playRingFeedback(className) {
        clearTimeout(ringMotionTimer);
        shell.classList.remove("motion-success", "motion-error");
        void shell.offsetWidth;
        shell.classList.add(className);
        ringMotionTimer = setTimeout(() => {
          shell.classList.remove(className);
        }, className === "motion-success" ? 1500 : 650);
      }

      function clearFile() {
        fileInput.value = "";
        textarea.value = "";
        fileName.textContent = "或将文件拖到此处";
        fileTitle.textContent = "选择采集的文件";
        hasFile = false;
        shell.classList.remove("has-file", "settings-open", "import-confirm");
        importConfirm = false;
        settingsPanel.inert = true;
        settingsToggle.setAttribute("aria-expanded", "false");
        manual.classList.remove("open");
        importButton.textContent = "生成";
        cancelButton.textContent = "上传";
        importButton.disabled = false;
        cancelButton.disabled = false;
        clearFileButton.disabled = true;
        resizePanel(188);
      }

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, Math.max(0, ms)));
      }

      function readFileAsText(file, callback) {
        const reader = new FileReader();
        reader.onload = () => callback(String(reader.result || ""));
        reader.onerror = () => {
          fileName.textContent = "无法读取文件";
        };
        reader.readAsText(file);
      }
    </script>
  </body>
</html>
