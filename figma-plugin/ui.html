<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f7f7f7;
        --surface-hover: #f2f2f2;
        --text: #0d0d0d;
        --text-muted: #666666;
        --text-subtle: #8a8a8a;
        --border: rgba(13, 13, 13, 0.12);
        --border-strong: rgba(13, 13, 13, 0.24);
        --focus: rgba(13, 13, 13, 0.12);
        --radius: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--text);
        background: var(--bg);
        font: 12px/1.42 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      .shell {
        height: 100vh;
        display: grid;
        grid-template-rows: 1fr auto;
        background: var(--bg);
      }

      .content {
        display: grid;
        align-content: start;
        gap: 12px;
        padding: 20px 28px 14px;
      }

      .hero {
        display: grid;
        gap: 8px;
      }

      .eyebrow {
        width: max-content;
        padding: 2px 9px;
        border-radius: 999px;
        color: #3d3d3d;
        background: var(--surface);
        font-size: 11px;
        font-weight: 700;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      h2 {
        font-size: 15px;
        line-height: 1.25;
      }

      p {
        color: var(--text-muted);
      }

      .section {
        display: grid;
        gap: 8px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .file-picker {
        min-height: 82px;
        display: grid;
        place-items: center;
        padding: 12px;
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
        background: #ffffff;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
      }

      .file-picker:hover,
      .file-picker.dragover {
        border-color: rgba(13, 13, 13, 0.46);
        background: #fafafa;
      }

      .file-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        max-width: 430px;
      }

      .upload-icon {
        width: 26px;
        height: 26px;
        flex: 0 0 auto;
        color: var(--text);
      }

      .file-copy {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .file-title {
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .file-name {
        min-width: 0;
        overflow: hidden;
        color: var(--text-muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
      }

      .hint {
        color: var(--text-subtle);
      }

      .native-select {
        display: none;
      }

      .select-wrap {
        position: relative;
      }

      .select-trigger {
        width: 100%;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 10px 0 12px;
        color: var(--text);
        background: #ffffff;
        text-align: left;
      }

      .select-trigger:hover {
        background: #fbfbfb;
      }

      .select-trigger[aria-expanded="true"] {
        border-color: rgba(13, 13, 13, 0.42);
      }

      .chevron {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        color: var(--text);
      }

      .select-menu {
        position: absolute;
        z-index: 10;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
      }

      .select-wrap.open .select-menu {
        display: grid;
        padding: 4px;
      }

      .select-wrap[data-select="language"] .select-menu {
        top: auto;
        bottom: calc(100% + 6px);
      }

      .select-option {
        width: 100%;
        height: 30px;
        border: 0;
        border-radius: 6px;
        padding: 0 10px;
        color: var(--text);
        background: transparent;
        text-align: left;
        font-weight: 500;
      }

      .select-option:hover {
        background: var(--surface);
      }

      .select-option.active {
        background: var(--surface-hover);
        font-weight: 700;
      }

      textarea {
        width: 100%;
        height: 92px;
        padding: 10px;
        resize: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        background: #ffffff;
        outline: none;
        font: 11px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }

      textarea:focus,
      button:focus-visible {
        border-color: rgba(13, 13, 13, 0.46);
        box-shadow: 0 0 0 3px var(--focus);
        outline: none;
      }

      .manual {
        display: none;
        gap: 8px;
      }

      .manual.open {
        display: grid;
      }

      .toggle {
        width: max-content;
        min-height: auto;
        border: 0;
        border-radius: 6px;
        padding: 0;
        color: var(--text-muted);
        background: transparent;
        font-size: 12px;
        font-weight: 600;
      }

      .toggle:hover {
        color: var(--text);
      }

      .actions {
        display: flex;
        gap: 12px;
        padding: 12px 28px 14px;
        border-top: 1px solid var(--border);
        background: #ffffff;
      }

      button {
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        padding: 8px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .toggle,
      .select-trigger,
      .select-option {
        min-height: auto;
      }

      #import {
        flex: 1;
        color: #ffffff;
        background: #000000;
      }

      #import:hover {
        background: #202020;
      }

      #cancel {
        min-width: 98px;
        color: var(--text);
        border-color: var(--border);
        background: #ffffff;
      }

      #cancel:hover {
        background: var(--surface);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="content">
        <div class="hero">
          <div class="eyebrow">Figma 生成器</div>
          <h1>逆向设计组件</h1>
          <p>将网页采集数据生成可审计、可复制的 Figma 设计系统草稿。</p>
        </div>

        <section class="section">
          <h2>导入数据</h2>
          <div id="drop-zone" class="file-picker">
            <div class="file-row">
              <svg class="upload-icon" viewBox="0 0 34 34" fill="none" aria-hidden="true">
                <path d="M9.5 23.5V26.5C9.5 28.1569 10.8431 29.5 12.5 29.5H21.5C23.1569 29.5 24.5 28.1569 24.5 26.5V23.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M17 24V7.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M11.5 13L17 7.5L22.5 13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="file-copy">
                <div class="file-title">选择采集数据文件（.uikit.json）</div>
                <div id="file-name" class="file-name">或将文件拖拽到此处</div>
              </div>
            </div>
            <input id="file" type="file" accept=".json,application/json" hidden>
          </div>
          <button id="toggle-manual" class="toggle" type="button">粘贴 JSON 文本</button>
          <div id="manual" class="manual">
            <label for="json">Normalized design-system JSON</label>
            <textarea id="json" spellcheck="false"></textarea>
          </div>
        </section>

        <section class="section">
          <div class="field">
            <label for="mode">生成内容</label>
            <div class="select-wrap" data-select="mode">
              <select id="mode" class="native-select" tabindex="-1" aria-hidden="true">
                <option value="designer" selected>设计系统草稿（推荐）</option>
                <option value="library">组件库草稿</option>
                <option value="replica">页面截图参考</option>
                <option value="audit">审阅草稿</option>
              </select>
              <button class="select-trigger" type="button" aria-expanded="false">
                <span class="select-label">设计系统草稿（推荐）</span>
                <svg class="chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div class="select-menu" role="listbox">
                <button class="select-option active" type="button" data-value="designer">设计系统草稿（推荐）</button>
                <button class="select-option" type="button" data-value="library">组件库草稿</button>
                <button class="select-option" type="button" data-value="replica">页面截图参考</button>
                <button class="select-option" type="button" data-value="audit">审阅草稿</button>
              </div>
            </div>
            <p class="hint">将生成可审计、可复制的设计系统草稿，包含样式、组件与资源。</p>
          </div>
        </section>

        <section class="section">
          <div class="field">
            <label for="language">输出语言</label>
            <div class="select-wrap" data-select="language">
              <select id="language" class="native-select" tabindex="-1" aria-hidden="true">
                <option value="zh" selected>中文</option>
                <option value="bilingual">中英双语</option>
                <option value="en">English</option>
              </select>
              <button class="select-trigger" type="button" aria-expanded="false">
                <span class="select-label">中文</span>
                <svg class="chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div class="select-menu" role="listbox">
                <button class="select-option active" type="button" data-value="zh">中文</button>
                <button class="select-option" type="button" data-value="bilingual">中英双语</button>
                <button class="select-option" type="button" data-value="en">English</button>
              </div>
            </div>
            <p class="hint">生成内容的界面语言与文案语言。</p>
          </div>
        </section>
      </section>

      <div class="actions">
        <button id="import">生成到 Figma</button>
        <button id="cancel">取消</button>
      </div>
    </main>

    <script>
      const textarea = document.getElementById("json");
      const fileInput = document.getElementById("file");
      const fileName = document.getElementById("file-name");
      const manual = document.getElementById("manual");
      const language = document.getElementById("language");
      const mode = document.getElementById("mode");
      const dropZone = document.getElementById("drop-zone");

      dropZone.onclick = () => {
        fileInput.click();
      };

      fileInput.onchange = () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        loadFile(file);
      };

      dropZone.ondragover = (event) => {
        event.preventDefault();
        dropZone.classList.add("dragover");
      };

      dropZone.ondragleave = () => {
        dropZone.classList.remove("dragover");
      };

      dropZone.ondrop = (event) => {
        event.preventDefault();
        dropZone.classList.remove("dragover");
        const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
        if (file) loadFile(file);
      };

      document.getElementById("toggle-manual").onclick = () => {
        manual.classList.toggle("open");
      };

      document.getElementById("import").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "import", json: textarea.value, language: language.value, mode: mode.value } }, "*");
      };

      document.getElementById("cancel").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
      };

      document.addEventListener("click", (event) => {
        for (const wrap of document.querySelectorAll(".select-wrap.open")) {
          if (!wrap.contains(event.target)) closeSelect(wrap);
        }
      });

      for (const wrap of document.querySelectorAll(".select-wrap")) {
        const select = wrap.querySelector("select");
        const trigger = wrap.querySelector(".select-trigger");
        const label = wrap.querySelector(".select-label");
        const options = Array.from(wrap.querySelectorAll(".select-option"));
        trigger.onclick = (event) => {
          event.stopPropagation();
          const isOpen = wrap.classList.contains("open");
          for (const other of document.querySelectorAll(".select-wrap.open")) closeSelect(other);
          if (!isOpen) {
            wrap.classList.add("open");
            trigger.setAttribute("aria-expanded", "true");
          }
        };
        for (const option of options) {
          option.onclick = (event) => {
            event.stopPropagation();
            select.value = option.dataset.value || "";
            label.textContent = option.textContent || "";
            for (const item of options) item.classList.toggle("active", item === option);
            closeSelect(wrap);
          };
        }
      }

      function closeSelect(wrap) {
        wrap.classList.remove("open");
        const trigger = wrap.querySelector(".select-trigger");
        if (trigger) trigger.setAttribute("aria-expanded", "false");
      }

      function loadFile(file) {
        readFileAsText(file, (content) => {
          textarea.value = content;
          fileName.textContent = file.name;
        });
      }

      function readFileAsText(file, callback) {
        const reader = new FileReader();
        reader.onload = () => callback(String(reader.result || ""));
        reader.onerror = () => {
          fileName.textContent = "无法读取文件";
        };
        reader.readAsText(file);
      }
    </script>
  </body>
</html>
