<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UI Trace · Web 采集器</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f3f3f3;
        --panel: #ffffff;
        --surface: #ffffff;
        --soft: #f4f4f4;
        --soft-2: #f9f9f9;
        --text: #101010;
        --muted: #666666;
        --label: #555555;
        --quiet: #969696;
        --border: #dddddd;
        --border-strong: rgba(0, 0, 0, 0.15);
        --action: #0d0d0d;
        --action-text: #ffffff;
        --green: #00c961;
        --danger: #cf3b2e;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.055), 0 0 0.5px rgba(0, 0, 0, 0.28);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --page: #0b0b0b;
        --panel: #050505;
        --surface: #202020;
        --soft: #252525;
        --soft-2: #1b1b1b;
        --text: #ffffff;
        --muted: #a7a7a7;
        --label: #d6d6d6;
        --quiet: #8b8b8b;
        --border: #464646;
        --border-strong: rgba(255, 255, 255, 0.42);
        --action: #f5f5f5;
        --action-text: #111111;
        --shadow: 0 4px 14px rgba(0, 0, 0, 0.34), 0 0 0.5px rgba(255, 255, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 380px;
        min-height: 292px;
        margin: 0;
        overflow-x: hidden;
        color: var(--text);
        background: var(--page);
        font: 12px/1.2 "PingFang SC", "Microsoft YaHei", Inter, system-ui, sans-serif;
      }

      button,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--green);
        outline-offset: 2px;
      }

      .shell {
        min-height: 292px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 15px;
        border-radius: 30px;
        background: var(--panel);
      }

      .topbar {
        height: 27px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .mode-toggle,
      .clear {
        min-height: 27px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 15px;
        border-radius: 24px;
        color: var(--text);
        background: var(--soft);
        font-size: 12px;
        font-weight: 800;
        line-height: 13px;
      }

      .clear {
        background: transparent;
      }

      .clear[data-confirm="true"] {
        color: #ffffff;
        background: var(--danger);
      }

      .mode-dot {
        width: 7px;
        height: 7px;
        flex: 0 0 7px;
        border-radius: 50%;
        background: var(--green);
      }

      .content-stack {
        width: 350px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .session {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .session-overview {
        position: relative;
        min-height: 147px;
        display: flex;
        align-items: center;
        gap: 35px;
        padding: 30px;
      }

      .theme-toggle {
        width: 71px;
        height: 71px;
        flex: 0 0 71px;
        display: grid;
        place-items: center;
        border: 10px solid var(--green);
        border-radius: 50%;
        color: var(--text);
        background: var(--surface);
      }

      .session.empty .theme-toggle {
        border-color: var(--soft);
      }

      .theme-toggle svg {
        width: 26px;
        height: 26px;
      }

      .session-copy {
        min-width: 0;
        display: grid;
        gap: 19px;
      }

      #session-count {
        min-width: 0;
        overflow: hidden;
        color: var(--text);
        font-size: 23px;
        font-weight: 900;
        line-height: 24px;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .session-meta {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        line-height: 12px;
        white-space: nowrap;
      }

      .session-meta svg {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
      }

      #session-host {
        max-width: 72px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #session-latest {
        overflow: hidden;
        max-width: 96px;
        text-overflow: ellipsis;
      }

      .details-toggle {
        position: absolute;
        left: 50%;
        bottom: 9px;
        width: 46px;
        height: 18px;
        padding: 0;
        border-radius: 999px;
        background: transparent;
        transform: translateX(-50%);
      }

      .details-toggle::before {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 7px;
        height: 4px;
        border-radius: 999px;
        background: var(--quiet);
      }

      .edit-label {
        display: none;
      }

      .label-editor,
      .advanced-panel {
        display: none;
      }

      .session.expanded .label-editor {
        display: grid;
      }

      .advanced.is-advanced.expanded .advanced-panel {
        display: grid;
      }

      .session.expanded {
        overflow: visible;
      }

      .label-editor,
      .advanced-panel {
        gap: 15px;
        padding: 0 30px 15px;
      }

      .label-editor-title,
      .advanced-title {
        color: var(--label);
        font-size: 15px;
        font-weight: 500;
        line-height: 16px;
      }

      .label-editor-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .label-editor select {
        display: none;
      }

      .custom-label-select {
        position: relative;
        width: 142px;
        flex: 0 0 142px;
      }

      .label-select-trigger,
      .advanced-action {
        width: 100%;
        min-height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 12px 15px;
        border: 1px solid var(--border);
        border-radius: 30px;
        color: var(--text);
        background: var(--surface);
        font-size: 15px;
        font-weight: 500;
        line-height: 14px;
        text-align: left;
      }

      .label-select-trigger svg {
        width: 12px;
        flex: 0 0 auto;
      }

      .label-options {
        position: absolute;
        z-index: 20;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 15px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .custom-label-select.open .label-options {
        display: grid;
      }

      .label-option {
        min-height: 28px;
        padding: 6px 9px;
        border-radius: 10px;
        color: var(--text);
        background: transparent;
        text-align: left;
        font-size: 12px;
      }

      .label-option:hover,
      .label-option[aria-selected="true"] {
        background: var(--soft);
      }

      .label-save,
      .label-cancel {
        min-width: 61px;
        min-height: 38px;
        padding: 11px 15px;
        border-radius: 30px;
        color: var(--text);
        background: transparent;
        font-size: 15px;
        font-weight: 500;
      }

      .label-save {
        border: 1px solid var(--border-strong);
      }

      .advanced {
        display: contents;
      }

      .advanced-panel {
        padding-top: 0;
      }

      .advanced-section {
        display: grid;
        gap: 15px;
      }

      .advanced-action {
        justify-content: center;
      }

      .segmented {
        position: relative;
        height: 38px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 4px;
        border: 1px solid var(--border);
        border-radius: 30px;
        background: var(--soft-2);
      }

      .segmented::before {
        content: "";
        position: absolute;
        top: 4px;
        bottom: 4px;
        left: 4px;
        width: calc(50% - 4px);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transition: transform 160ms ease;
      }

      .segmented.full-page::before {
        transform: translateX(100%);
      }

      .segment {
        position: relative;
        z-index: 1;
        min-height: 28px;
        border-radius: 24px;
        color: var(--quiet);
        background: transparent;
        font-size: 15px;
        font-weight: 500;
      }

      .segment.active {
        color: var(--text);
      }

      #replica-scope,
      .hint {
        display: none;
      }

      .advanced-utility {
        min-height: 30px;
        padding: 0;
        color: var(--muted);
        background: transparent;
        text-align: left;
        font-size: 11px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .actions button {
        height: 56px;
        border-radius: 30px;
        font-size: 18px;
        font-weight: 500;
        line-height: 20px;
      }

      .secondary {
        border: 1px solid var(--border-strong);
        color: var(--text);
        background-color: var(--surface);
      }

      .primary {
        color: var(--action-text);
        background-color: var(--action);
      }

      :root[data-theme="dark"] .secondary {
        color: #ffffff;
        background-color: #050505;
      }

      :root[data-theme="dark"] .primary {
        color: #111111;
        background-color: #f5f5f5;
      }

      .primary:disabled,
      .secondary:disabled,
      .clear:disabled,
      .advanced-action:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .circle-action {
        display: none;
        width: 56px;
        padding: 0;
        border: 1px solid var(--border-strong);
        border-radius: 50% !important;
        color: var(--text);
        background: var(--surface);
        font-size: 32px !important;
        line-height: 1;
      }

      .circle-action.dark {
        color: var(--action-text);
        border-color: var(--action);
        background-color: var(--action);
      }

      .actions.capture-confirm {
        grid-template-columns: 56px 1fr;
      }

      .actions.export-confirm {
        grid-template-columns: 1fr 56px;
      }

      .actions.capture-confirm #export-normalized,
      .actions.export-confirm #capture {
        display: none;
      }

      .actions.capture-confirm #capture-back,
      .actions.export-confirm #export-confirm {
        display: block;
      }

      #status {
        min-height: 0;
        max-height: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        line-height: 14px;
      }

      #status:not(:empty) {
        max-height: 28px;
      }

      html {
        background: transparent;
        border-radius: 26px;
        overflow: hidden;
      }

      body {
        width: 260px;
        min-height: 0;
        border-radius: 26px;
        overflow: hidden;
        background: transparent;
        font-family: "PingFang SC", "PingFang TC", "PingFang HK", sans-serif;
      }

      .shell {
        width: 260px;
        min-height: 0;
        gap: 10px;
        padding: 10px;
        border-radius: 26px;
        overflow: hidden;
      }

      .topbar {
        height: 20px;
      }

      .mode-toggle,
      .clear {
        width: auto;
        min-width: 74px;
        min-height: 20px;
        justify-content: center;
        gap: 5px;
        padding: 5px 9px;
        border-radius: 18px;
        font-size: 11px;
        line-height: 11px;
        white-space: nowrap;
      }

      .clear {
        width: 62px;
        min-width: 62px;
        padding-left: 0;
        padding-right: 0;
      }

      .mode-dot {
        width: 6px;
        height: 6px;
        flex-basis: 6px;
      }

      .content-stack {
        width: 240px;
        gap: 10px;
      }

      .session {
        border-radius: 20px;
      }

      .session-overview {
        position: static;
        min-height: 98px;
        gap: 22px;
        padding: 20px;
      }

      .theme-toggle {
        width: 48px;
        height: 48px;
        flex-basis: 48px;
        border-width: 7px;
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .session-copy {
        gap: 11px;
      }

      #session-count {
        font-size: 17px;
        line-height: 18px;
      }

      .session-meta {
        gap: 4px;
        font-size: 8px;
        line-height: 10px;
      }

      .session-meta svg {
        width: 10px;
        height: 10px;
      }

      #session-host {
        max-width: 52px;
      }

      #session-latest {
        max-width: 62px;
      }

      .details-toggle {
        bottom: 0;
        width: 72px;
        height: 28px;
      }

      .details-toggle::before {
        left: 25px;
        right: 25px;
        top: 12px;
        height: 3px;
      }

      .label-editor,
      .advanced-panel {
        gap: 10px;
        padding: 0 20px 24px;
      }

      .label-editor-title,
      .advanced-title {
        font-size: 12px;
        line-height: 13px;
      }

      .label-editor-row {
        gap: 8px;
      }

      .label-editor select {
        width: 92px;
        min-height: 27px;
        appearance: none;
        -webkit-appearance: none;
        display: block;
        padding: 0 28px 0 10px;
        border: 1px solid var(--border);
        border-radius: 18px;
        color: var(--text);
        background-color: var(--surface);
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%23101010' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-position: right 10px center;
        background-repeat: no-repeat;
        background-size: 12px 12px;
        font-size: 12px;
        line-height: 13px;
      }

      :root[data-theme="dark"] .label-editor select {
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%23ffffff' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      }

      .custom-label-select,
      .label-options {
        display: none !important;
      }

      .label-save,
      .label-cancel {
        min-width: 40px;
        min-height: 27px;
        padding: 0 10px;
        font-size: 12px;
      }

      .advanced-section {
        gap: 9px;
      }

      .advanced-action,
      .segmented {
        min-height: 29px;
        height: 29px;
        border-radius: 18px;
        font-size: 12px;
      }

      .advanced-action {
        padding: 0 10px;
      }

      .segmented {
        padding: 3px;
      }

      .segmented::before {
        top: 3px;
        bottom: 3px;
        left: 3px;
        width: calc(50% - 3px);
      }

      .segment {
        min-height: 21px;
        font-size: 12px;
      }

      .advanced-utility {
        display: none;
      }

      .actions {
        gap: 10px;
      }

      .actions button {
        height: 38px;
        border-radius: 22px;
        font-size: 15px;
        line-height: 16px;
      }

      .circle-action {
        width: 38px;
        font-size: 24px !important;
      }

      .actions.capture-confirm {
        grid-template-columns: 38px 1fr;
      }

      .actions.export-confirm {
        grid-template-columns: 38px 1fr;
      }

      .actions.capture-confirm #capture-back,
      .actions.export-confirm #capture-back {
        display: block;
        order: 1;
      }

      .actions.capture-confirm #capture,
      .actions.export-confirm #export-normalized {
        order: 2;
      }

      .actions.export-confirm #export-confirm {
        display: none;
      }

      .details-toggle::before {
        top: 12px;
        height: 3px;
      }

      .label-editor select {
        display: none;
      }

      .custom-label-select {
        position: relative;
        width: 92px;
        flex: 0 0 92px;
        display: block !important;
      }

      .label-select-trigger {
        min-height: 27px;
        padding: 0 24px 0 10px;
        border-radius: 18px;
        font-size: 12px;
        line-height: 13px;
        overflow: hidden;
        white-space: nowrap;
      }

      .label-select-trigger span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .label-select-trigger svg {
        position: absolute;
        right: 10px;
        width: 10px;
      }

      .label-options {
        top: auto;
        bottom: calc(100% + 6px);
        display: none !important;
        max-height: 142px;
        overflow-y: auto;
        padding: 6px;
        border-radius: 16px;
        scrollbar-width: none;
      }

      .label-options::-webkit-scrollbar {
        display: none;
      }

      .custom-label-select.open .label-options {
        display: grid !important;
      }

      .label-option {
        min-height: 26px;
        padding: 6px 9px;
        border-radius: 10px;
        font-size: 12px;
      }

      .label-option:hover,
      .label-option[aria-selected="true"] {
        background: var(--soft);
      }

      .actions.export-confirm {
        grid-template-columns: 1fr 38px;
      }

      .actions.export-confirm #export-normalized {
        display: block;
        order: 1;
      }

      .actions.export-confirm #export-confirm {
        display: block;
        order: 2;
      }

      .actions.export-confirm #capture,
      .actions.export-confirm #capture-back {
        display: none;
      }

      @property --ring-fill {
        syntax: "<percentage>";
        inherits: false;
        initial-value: 0%;
      }

      :root {
        --motion-ease: cubic-bezier(0.22, 0.9, 0.25, 1);
        --motion-snap: cubic-bezier(0.2, 1.35, 0.35, 1);
        --theme-wipe-color: #050505;
      }

      body,
      .shell,
      .session,
      .session-overview,
      .mode-toggle,
      .clear,
      .secondary,
      .primary,
      .circle-action,
      .label-select-trigger,
      .label-option,
      .label-save,
      .label-cancel,
      .advanced-action,
      .segmented,
      .segment,
      .details-toggle::before {
        transition:
          background-color 220ms var(--motion-ease),
          border-color 220ms var(--motion-ease),
          color 180ms var(--motion-ease),
          box-shadow 220ms var(--motion-ease),
          opacity 180ms var(--motion-ease),
          transform 180ms var(--motion-ease);
      }

      body::before {
        content: "";
        position: fixed;
        inset: -36px;
        z-index: 999;
        pointer-events: none;
        background: linear-gradient(110deg, transparent 0%, var(--theme-wipe-color) 38%, var(--theme-wipe-color) 62%, transparent 100%);
        opacity: 0;
        transform: translateX(-120%) skewX(-10deg);
      }

      :root.theme-wipe body::before {
        animation: theme-wipe 460ms var(--motion-ease) both;
      }

      button:not(:disabled):active {
        transform: scale(0.98);
      }

      .actions {
        transition: grid-template-columns 230ms var(--motion-ease), gap 180ms var(--motion-ease);
      }

      .actions button {
        transition:
          width 230ms var(--motion-ease),
          background-color 180ms var(--motion-ease),
          border-color 180ms var(--motion-ease),
          color 180ms var(--motion-ease),
          opacity 160ms var(--motion-ease),
          transform 160ms var(--motion-ease);
      }

      .theme-toggle {
        position: relative;
        isolation: isolate;
        --ring-width: 7px;
      }

      .theme-toggle::before,
      .theme-toggle::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
      }

      .theme-toggle::before {
        z-index: 0;
        background: conic-gradient(from -90deg, var(--green) var(--ring-fill), var(--soft) 0);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - var(--ring-width)), #000 calc(100% - var(--ring-width)));
        mask: radial-gradient(farthest-side, transparent calc(100% - var(--ring-width)), #000 calc(100% - var(--ring-width)));
      }

      .theme-toggle svg {
        position: relative;
        z-index: 1;
        --icon-offset-x: 0px;
        transform: translateX(var(--icon-offset-x));
      }

      .theme-toggle .ring-progress {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        opacity: 0;
        transform: rotate(-90deg);
      }

      .ring-progress-track,
      .ring-progress-fill {
        fill: none;
        stroke-width: 7;
      }

      .ring-progress-track {
        stroke: var(--soft);
      }

      .ring-progress-fill {
        stroke: var(--green);
        stroke-linecap: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
      }

      .session.is-collecting .theme-toggle {
        border-color: transparent !important;
      }

      .session.is-collecting .theme-toggle::before {
        opacity: 0;
        animation: none;
      }

      .session.is-collecting .theme-toggle::after {
        opacity: 0;
        animation: none;
      }

      .session.is-collecting .theme-toggle .ring-progress {
        opacity: 1;
        animation: none;
      }

      .session.is-collecting .theme-toggle .ring-progress-fill {
        animation: ring-stroke-fill 950ms cubic-bezier(0.2, 0.85, 0.2, 1) forwards;
      }

      .session.is-collecting .theme-toggle svg {
        animation: icon-focus 900ms ease-in-out infinite alternate;
      }

      .session.motion-success .theme-toggle {
        animation: ring-pop 560ms var(--motion-snap);
      }

      .session.motion-success .theme-toggle::after {
        border: 2px solid var(--green);
        animation: ring-wave 620ms ease-out forwards;
      }

      .session.motion-error .theme-toggle {
        animation: micro-shake 260ms ease-in-out;
      }

      .session.expanded .label-editor,
      .advanced.is-advanced.expanded .advanced-panel {
        animation: drawer-in 220ms var(--motion-ease) both;

      <section class="content-stack" aria-label="采集器内容">
        <section id="session-card" class="session empty" aria-label="当前采集会话">
          <div class="session-overview" title="切换明暗主题">
            <button id="theme-toggle" class="theme-toggle" type="button" title="切换明暗主题" aria-label="切换明暗主题">
              <svg class="ring-progress" viewBox="0 0 48 48" aria-hidden="true">
                <circle class="ring-progress-track" cx="24" cy="24" r="20.5"></circle>
                <circle class="ring-progress-fill" cx="24" cy="24" r="20.5" pathLength="100"></circle>
              </svg>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M4 5.4A1.4 1.4 0 0 1 5.4 4H7a1 1 0 0 0 0-2H5.4A3.4 3.4 0 0 0 2 5.4V7a1 1 0 0 0 2 0zM17 2a1 1 0 1 0 0 2h1.6A1.4 1.4 0 0 1 20 5.4V7a1 1 0 1 0 2 0V5.4A3.4 3.4 0 0 0 18.6 2zM4 17a1 1 0 1 0-2 0v1.6A3.4 3.4 0 0 0 5.4 22H7a1 1 0 1 0 0-2H5.4A1.4 1.4 0 0 1 4 18.6zm18 0a1 1 0 1 0-2 0v1.6a1.4 1.4 0 0 1-1.4 1.4H17a1 1 0 1 0 0 2h1.6a3.4 3.4 0 0 0 3.4-3.4zM1 11a1 1 0 1 0 0 2h22a1 1 0 1 0 0-2z"/>
              </svg>
            </button>
            <div class="session-copy">
              <span id="session-count">尚未采集</span>
              <div class="session-meta">
                <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
                  <circle cx="9" cy="9" r="6.6" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M2.6 9h12.8M9 2.4c1.8 2 2.7 4.2 2.7 6.6S10.8 13.6 9 15.6M9 2.4C7.2 4.4 6.3 6.6 6.3 9s.9 4.6 2.7 6.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
                <span id="session-host">打开网页后点击采集</span><span id="latest-separator">·</span><span id="session-latest">当前：--</span>
              </div>
            </div>
          </div>
          <button id="details-toggle" class="details-toggle" type="button" aria-label="展开采集设置" aria-expanded="false"></button>

          <button id="edit-latest-label" class="edit-label" type="button" disabled>修改标签</button>
          <div id="label-editor" class="label-editor" inert>
            <div class="label-editor-title">修改当前标签</div>
            <div class="label-editor-row">
              <select id="latest-label-select" aria-label="当前标签">
                <option value="default">默认状态</option>
                <option value="menu-open">菜单打开</option>
                <option value="modal-open">弹窗打开</option>
                <option value="sidebar-open">侧栏展开</option>
                <option value="selected">选中状态</option>
                <option value="focused">聚焦状态</option>
                <option value="visible-interactive-states">可见交互状态</option>
                <option value="screenshot-viewport">当前可见区域截图</option>
                <option value="screenshot-full-page">完整页面截图</option>
              </select>
              <button id="cancel-latest-label" class="label-cancel" type="button">取消</button>
              <button id="save-latest-label" class="label-save" type="button">保存</button>
            </div>
          </div>

          <div id="advanced" class="advanced">
            <div id="advanced-panel" class="advanced-panel" inert>
              <section class="advanced-section">
                <div class="advanced-title">自动采集</div>
                <button id="capture-interactive" class="advanced-action" type="button">采集可交互界面</button>
              </section>
              <section class="advanced-section">
                <div class="advanced-title">页面截图</div>
                <select id="replica-scope" aria-label="截图范围">
                  <option value="viewport" selected>可见区域</option>
                  <option value="full-page">完整界面</option>
                </select>
                <div id="scope-segmented" class="segmented" aria-label="截图范围">
                  <button class="segment active" type="button" data-scope="viewport">可见区域</button>
                  <button class="segment" type="button" data-scope="full-page">完整界面</button>
                </div>
                <button id="capture-replica" class="advanced-action" type="button">采集页面截图</button>
              </section>
              <button id="export-session" class="advanced-utility" type="button" disabled>导出原始数据</button>
            </div>
          </div>
        </section>

        <section id="actions" class="actions" aria-label="主要操作">
          <button id="export-normalized" class="secondary" type="button" disabled>导出</button>
          <button id="capture-back" class="circle-action" type="button" aria-label="取消采集确认">‹</button>
          <button id="capture" class="primary" type="button">采集</button>
          <button id="export-confirm" class="circle-action dark" type="button" aria-label="取消导出确认">›</button>
        </section>
      </section>
      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script src="normalizer.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
